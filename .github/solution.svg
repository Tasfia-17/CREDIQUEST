<svg width="900" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F7FF"/>
      <stop offset="100%" style="stop-color:#FFF0F5"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <rect width="900" height="400" fill="url(#bgGrad)"/>
  
  <!-- Happy Central Character (CrediQuest Mascot) -->
  <g transform="translate(450, 200)">
    <!-- Glow effect -->
    <circle r="80" fill="url(#glow)"/>
    <!-- Body -->
    <ellipse cy="15" rx="50" ry="60" fill="#FF6B00"/>
    <!-- Head -->
    <circle cy="-30" r="40" fill="#FFB347"/>
    <!-- Happy eyes -->
    <circle cx="-15" cy="-35" r="5" fill="white"/>
    <circle cx="-15" cy="-35" r="3" fill="black"/>
    <circle cx="15" cy="-35" r="5" fill="white"/>
    <circle cx="15" cy="-35" r="3" fill="black"/>
    <!-- Big smile -->
    <path d="M -20 -20 Q 0 -10 20 -20" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Crown -->
    <path d="M -25 -60 L -20 -70 L -10 -65 L 0 -75 L 10 -65 L 20 -70 L 25 -60 Z" fill="#FFD700"/>
    <circle cx="-20" cy="-70" r="3" fill="#FF6347"/>
    <circle cy="-75" r="3" fill="#FF6347"/>
    <circle cx="20" cy="-70" r="3" fill="#FF6347"/>
    <!-- Arms waving -->
    <path d="M -50 0 Q -70 -10 -75 5" stroke="#FFB347" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 50 0 Q 70 -10 75 5" stroke="#FFB347" stroke-width="10" fill="none" stroke-linecap="round"/>
    <text y="100" text-anchor="middle" font-size="18" font-weight="bold" fill="#FF6B00">CrediQuest</text>
  </g>
  
  <!-- Feature 1: Smart Contract Character (Top Left) -->
  <g transform="translate(150, 100)">
    <!-- Robot character -->
    <rect x="-30" y="-20" width="60" height="50" rx="5" fill="#4169E1"/>
    <rect x="-25" y="-15" width="50" height="40" rx="3" fill="#6495ED"/>
    <!-- Screen face -->
    <rect x="-20" y="-10" width="40" height="25" rx="2" fill="#87CEEB"/>
    <circle cx="-10" cy="-2" r="3" fill="#32CD32"/>
    <circle cx="10" cy="-2" r="3" fill="#32CD32"/>
    <rect x="-8" y="8" width="16" height="3" rx="1" fill="#32CD32"/>
    <!-- Antenna -->
    <line x1="0" y1="-20" x2="0" y2="-30" stroke="#4169E1" stroke-width="3"/>
    <circle cy="-30" r="4" fill="#FFD700"/>
    <text y="50" text-anchor="middle" font-size="12" font-weight="bold">Smart Contracts</text>
    <text y="65" text-anchor="middle" font-size="10" fill="#666">Automated Trust</text>
  </g>
  
  <!-- Feature 2: Gaming Character (Top Right) -->
  <g transform="translate(750, 100)">
    <!-- Game character -->
    <ellipse cy="5" rx="35" ry="40" fill="#9370DB"/>
    <circle cy="-20" r="28" fill="#DDA0DD"/>
    <!-- Excited eyes -->
    <circle cx="-10" cy="-25" r="4" fill="black"/>
    <circle cx="10" cy="-25" r="4" fill="black"/>
    <path d="M -12 -15 Q 0 -8 12 -15" stroke="black" stroke-width="2" fill="none"/>
    <!-- Game controller in hands -->
    <rect x="-20" y="20" width="40" height="15" rx="7" fill="#FF6347"/>
    <circle cx="-10" cy="27" r="2" fill="white"/>
    <circle cx="10" cy="27" r="2" fill="white"/>
    <text y="65" text-anchor="middle" font-size="12" font-weight="bold">Tournaments</text>
    <text y="80" text-anchor="middle" font-size="10" fill="#666">Win Prizes</text>
  </g>
  
  <!-- Feature 3: Credit Score Character (Bottom Left) -->
  <g transform="translate(150, 300)">
    <!-- Scholar character with graduation cap -->
    <ellipse cy="10" rx="35" ry="45" fill="#20B2AA"/>
    <circle cy="-25" r="30" fill="#AFEEEE"/>
    <!-- Smart glasses -->
    <circle cx="-12" cy="-28" r="6" fill="none" stroke="black" stroke-width="2"/>
    <circle cx="12" cy="-28" r="6" fill="none" stroke="black" stroke-width="2"/>
    <line x1="-6" y1="-28" x2="6" y2="-28" stroke="black" stroke-width="2"/>
    <!-- Smile -->
    <path d="M -10 -15 Q 0 -10 10 -15" stroke="black" stroke-width="2" fill="none"/>
    <!-- Graduation cap -->
    <rect x="-20" y="-50" width="40" height="5" fill="#000080"/>
    <rect x="-15" y="-55" width="30" height="5" fill="#000080"/>
    <!-- Star badge -->
    <path d="M 0 -5 L 3 5 L 13 5 L 5 11 L 8 21 L 0 15 L -8 21 L -5 11 L -13 5 L -3 5 Z" fill="#FFD700"/>
    <text y="70" text-anchor="middle" font-size="12" font-weight="bold">Credit Score</text>
    <text y="85" text-anchor="middle" font-size="10" fill="#666">Build Reputation</text>
  </g>
  
  <!-- Feature 4: DeFi Character (Bottom Right) -->
  <g transform="translate(750, 300)">
    <!-- Banker character -->
    <ellipse cy="10" rx="35" ry="45" fill="#228B22"/>
    <circle cy="-25" r="30" fill="#90EE90"/>
    <!-- Happy eyes -->
    <circle cx="-10" cy="-30" r="4" fill="black"/>
    <circle cx="10" cy="-30" r="4" fill="black"/>
    <path d="M -12 -18 Q 0 -12 12 -18" stroke="black" stroke-width="2" fill="none"/>
    <!-- Top hat -->
    <rect x="-18" y="-50" width="36" height="8" fill="#2F4F4F"/>
    <rect x="-12" y="-58" width="24" height="8" fill="#2F4F4F"/>
    <!-- Money bag -->
    <ellipse cx="0" cy="35" rx="15" ry="18" fill="#FFD700"/>
    <text x="0" y="40" text-anchor="middle" font-size="16" font-weight="bold" fill="#228B22">$</text>
    <text y="70" text-anchor="middle" font-size="12" font-weight="bold">DeFi Access</text>
    <text y="85" text-anchor="middle" font-size="10" fill="#666">Real Loans</text>
  </g>
  
  <!-- Connecting lines with arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF6B00"/>
    </marker>
  </defs>
  <line x1="200" y1="120" x2="400" y2="180" stroke="#FF6B00" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="5,5"/>
  <line x1="700" y1="120" x2="500" y2="180" stroke="#FF6B00" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="5,5"/>
  <line x1="200" y1="280" x2="400" y2="220" stroke="#FF6B00" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="5,5"/>
  <line x1="700" y1="280" x2="500" y2="220" stroke="#FF6B00" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="5,5"/>
  
  <!-- Sparkles -->
  <g fill="#FFD700">
    <path d="M 100 50 L 103 58 L 111 61 L 103 64 L 100 72 L 97 64 L 89 61 L 97 58 Z"/>
    <path d="M 800 50 L 803 58 L 811 61 L 803 64 L 800 72 L 797 64 L 789 61 L 797 58 Z"/>
    <path d="M 100 350 L 103 358 L 111 361 L 103 364 L 100 372 L 97 364 L 89 361 L 97 358 Z"/>
    <path d="M 800 350 L 803 358 L 811 361 L 803 364 L 800 372 L 797 364 L 789 361 L 797 358 Z"/>
  </g>
</svg>
