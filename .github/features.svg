<svg width="900" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="feat1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
    <linearGradient id="feat2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1"/>
      <stop offset="100%" style="stop-color:#87CEEB"/>
    </linearGradient>
    <linearGradient id="feat3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32CD32"/>
      <stop offset="100%" style="stop-color:#90EE90"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="300" fill="#FFF9F0"/>
  
  <!-- Feature 1: ROSCA -->
  <g transform="translate(150, 150)">
    <circle r="60" fill="url(#feat1)" opacity="0.2"/>
    <circle r="45" fill="url(#feat1)"/>
    <ellipse cy="5" rx="25" ry="30" fill="#FFD700"/>
    <circle cy="-10" r="20" fill="#FFA500"/>
    <circle cx="-8" cy="-15" r="3" fill="black"/>
    <circle cx="8" cy="-15" r="3" fill="black"/>
    <path d="M -10 -5 Q 0 0 10 -5" stroke="black" stroke-width="2" fill="none"/>
    <text y="90" text-anchor="middle" font-size="14" font-weight="bold">ROSCA Circles</text>
    <text y="110" text-anchor="middle" font-size="11" fill="#666">Save Together</text>
  </g>
  
  <!-- Feature 2: Tournaments -->
  <g transform="translate(450, 150)">
    <circle r="60" fill="url(#feat2)" opacity="0.2"/>
    <circle r="45" fill="url(#feat2)"/>
    <rect x="-20" y="-10" width="40" height="20" rx="10" fill="#FFD700"/>
    <circle cx="-8" cy="0" r="3" fill="#FF6347"/>
    <circle cx="8" cy="0" r="3" fill="#32CD32"/>
    <path d="M -15 -25 L 0 -35 L 15 -25" stroke="#FFD700" stroke-width="3" fill="none"/>
    <text y="90" text-anchor="middle" font-size="14" font-weight="bold">Tournaments</text>
    <text y="110" text-anchor="middle" font-size="11" fill="#666">Win Prizes</text>
  </g>
  
  <!-- Feature 3: Credit Score -->
  <g transform="translate(750, 150)">
    <circle r="60" fill="url(#feat3)" opacity="0.2"/>
    <circle r="45" fill="url(#feat3)"/>
    <path d="M 0 -15 L 5 5 L 20 5 L 8 15 L 13 35 L 0 25 L -13 35 L -8 15 L -20 5 L -5 5 Z" fill="#FFD700"/>
    <circle cy="-25" r="15" fill="#32CD32"/>
    <text y="-20" text-anchor="middle" font-size="16" fill="white" font-weight="bold">A+</text>
    <text y="90" text-anchor="middle" font-size="14" font-weight="bold">Credit Score</text>
    <text y="110" text-anchor="middle" font-size="11" fill="#666">Build Reputation</text>
  </g>
</svg>
