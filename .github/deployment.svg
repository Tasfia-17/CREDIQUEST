<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <rect width="800" height="200" fill="#E6F3FF"/>
  
  <!-- Step 1 -->
  <g transform="translate(100, 100)">
    <circle r="35" fill="#FF6B00"/>
    <text y="5" text-anchor="middle" font-size="20" fill="white" font-weight="bold">1</text>
    <text y="60" text-anchor="middle" font-size="12" font-weight="bold">Deploy</text>
    <text y="75" text-anchor="middle" font-size="10" fill="#666">Contracts</text>
  </g>
  
  <path d="M 145 100 L 215 100" stroke="#666" stroke-width="3" marker-end="url(#ar)"/>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Step 2 -->
  <g transform="translate(260, 100)">
    <circle r="35" fill="#4169E1"/>
    <text y="5" text-anchor="middle" font-size="20" fill="white" font-weight="bold">2</text>
    <text y="60" text-anchor="middle" font-size="12" font-weight="bold">Verify</text>
    <text y="75" text-anchor="middle" font-size="10" fill="#666">Explorer</text>
  </g>
  
  <path d="M 305 100 L 375 100" stroke="#666" stroke-width="3" marker-end="url(#ar)"/>
  
  <!-- Step 3 -->
  <g transform="translate(420, 100)">
    <circle r="35" fill="#9370DB"/>
    <text y="5" text-anchor="middle" font-size="20" fill="white" font-weight="bold">3</text>
    <text y="60" text-anchor="middle" font-size="12" font-weight="bold">Update</text>
    <text y="75" text-anchor="middle" font-size="10" fill="#666">Frontend</text>
  </g>
  
  <path d="M 465 100 L 535 100" stroke="#666" stroke-width="3" marker-end="url(#ar)"/>
  
  <!-- Step 4 -->
  <g transform="translate(580, 100)">
    <circle r="35" fill="#32CD32"/>
    <text y="5" text-anchor="middle" font-size="20" fill="white" font-weight="bold">4</text>
    <text y="60" text-anchor="middle" font-size="12" font-weight="bold">Deploy</text>
    <text y="75" text-anchor="middle" font-size="10" fill="#666">Vercel</text>
  </g>
  
  <path d="M 625 100 L 695 100" stroke="#666" stroke-width="3" marker-end="url(#ar)"/>
  
  <!-- Step 5 -->
  <g transform="translate(740, 100)">
    <circle r="35" fill="#FFD700"/>
    <text y="8" text-anchor="middle" font-size="24" fill="white" font-weight="bold">✓</text>
    <text y="60" text-anchor="middle" font-size="12" font-weight="bold">Live</text>
  </g>
</svg>
