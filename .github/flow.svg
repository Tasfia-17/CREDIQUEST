<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#FFF5E6"/>
  
  <!-- Step 1 -->
  <g transform="translate(100, 100)">
    <circle r="40" fill="#FF6B00"/>
    <text y="5" text-anchor="middle" font-size="24" fill="white" font-weight="bold">1</text>
    <text y="70" text-anchor="middle" font-size="12" font-weight="bold">Connect</text>
    <text y="85" text-anchor="middle" font-size="10" fill="#666">Wallet</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 150 100 L 230 100" stroke="#FF6B00" stroke-width="3" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF6B00"/>
    </marker>
  </defs>
  
  <!-- Step 2 -->
  <g transform="translate(280, 100)">
    <circle r="40" fill="#4169E1"/>
    <text y="5" text-anchor="middle" font-size="24" fill="white" font-weight="bold">2</text>
    <text y="70" text-anchor="middle" font-size="12" font-weight="bold">Join Circle</text>
    <text y="85" text-anchor="middle" font-size="10" fill="#666">or Tournament</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 330 100 L 410 100" stroke="#FF6B00" stroke-width="3" marker-end="url(#arr)"/>
  
  <!-- Step 3 -->
  <g transform="translate(460, 100)">
    <circle r="40" fill="#9370DB"/>
    <text y="5" text-anchor="middle" font-size="24" fill="white" font-weight="bold">3</text>
    <text y="70" text-anchor="middle" font-size="12" font-weight="bold">Participate</text>
    <text y="85" text-anchor="middle" font-size="10" fill="#666">Save or Play</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 510 100 L 590 100" stroke="#FF6B00" stroke-width="3" marker-end="url(#arr)"/>
  
  <!-- Step 4 -->
  <g transform="translate(640, 100)">
    <circle r="40" fill="#32CD32"/>
    <text y="5" text-anchor="middle" font-size="24" fill="white" font-weight="bold">4</text>
    <text y="70" text-anchor="middle" font-size="12" font-weight="bold">Build Credit</text>
    <text y="85" text-anchor="middle" font-size="10" fill="#666">Earn Score</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 690 100 L 770 100" stroke="#FF6B00" stroke-width="3" marker-end="url(#arr)"/>
  
  <!-- Step 5 -->
  <g transform="translate(820, 100)">
    <circle r="40" fill="#FFD700"/>
    <text y="5" text-anchor="middle" font-size="24" fill="white" font-weight="bold">5</text>
    <text y="70" text-anchor="middle" font-size="12" font-weight="bold">DeFi Access</text>
    <text y="85" text-anchor="middle" font-size="10" fill="#666">Get Loans</text>
  </g>
  
  <!-- Happy character at end -->
  <g transform="translate(450, 350)">
    <ellipse cy="10" rx="50" ry="60" fill="#FF6B00"/>
    <circle cy="-30" r="40" fill="#FFB347"/>
    <circle cx="-15" cy="-35" r="5" fill="white"/>
    <circle cx="-15" cy="-35" r="3" fill="black"/>
    <circle cx="15" cy="-35" r="5" fill="white"/>
    <circle cx="15" cy="-35" r="3" fill="black"/>
    <path d="M -20 -20 Q 0 -10 20 -20" stroke="white" stroke-width="3" fill="none"/>
    <path d="M -50 0 Q -70 -10 -75 5" stroke="#FFB347" stroke-width="10" fill="none"/>
    <path d="M 50 0 Q 70 -10 75 5" stroke="#FFB347" stroke-width="10" fill="none"/>
  </g>
</svg>
