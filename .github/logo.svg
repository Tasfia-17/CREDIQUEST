<svg width="500" height="150" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  
  <!-- Cute Piggy Bank Character -->
  <g transform="translate(60, 75)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="35" ry="28" fill="#FFB6C1"/>
    <!-- Legs -->
    <rect x="-25" y="20" width="8" height="15" rx="4" fill="#FF69B4"/>
    <rect x="-10" y="20" width="8" height="15" rx="4" fill="#FF69B4"/>
    <rect x="5" y="20" width="8" height="15" rx="4" fill="#FF69B4"/>
    <rect x="20" y="20" width="8" height="15" rx="4" fill="#FF69B4"/>
    <!-- Snout -->
    <ellipse cx="0" cy="5" rx="15" ry="12" fill="#FF69B4"/>
    <circle cx="-5" cy="5" r="3" fill="#8B4513"/>
    <circle cx="5" cy="5" r="3" fill="#8B4513"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-8" r="4" fill="white"/>
    <circle cx="-10" cy="-8" r="2" fill="black"/>
    <circle cx="10" cy="-8" r="4" fill="white"/>
    <circle cx="10" cy="-8" r="2" fill="black"/>
    <!-- Smile -->
    <path d="M -8 0 Q 0 5 8 0" stroke="#FF1493" stroke-width="2" fill="none"/>
    <!-- Coin slot -->
    <rect x="-3" y="-20" width="6" height="12" fill="url(#grad2)"/>
    <!-- Ears -->
    <ellipse cx="-25" cy="-15" rx="8" ry="12" fill="#FFB6C1"/>
    <ellipse cx="25" cy="-15" rx="8" ry="12" fill="#FFB6C1"/>
    <!-- Tail -->
    <path d="M 35 -5 Q 45 -10 50 -5 Q 55 0 50 5" stroke="#FF69B4" stroke-width="4" fill="none"/>
  </g>
  
  <!-- Cute Game Controller Character -->
  <g transform="translate(140, 75)">
    <!-- Controller body -->
    <rect x="-30" y="-15" width="60" height="30" rx="15" fill="url(#grad1)"/>
    <!-- Face on controller -->
    <circle cx="-10" cy="-5" r="3" fill="white"/>
    <circle cx="-10" cy="-5" r="1.5" fill="black"/>
    <circle cx="10" cy="-5" r="3" fill="white"/>
    <circle cx="10" cy="-5" r="1.5" fill="black"/>
    <path d="M -5 5 Q 0 8 5 5" stroke="white" stroke-width="2" fill="none"/>
    <!-- D-pad -->
    <rect x="-20" y="-3" width="8" height="2" fill="#FFD700"/>
    <rect x="-18" y="-5" width="4" height="6" fill="#FFD700"/>
    <!-- Buttons -->
    <circle cx="15" cy="-5" r="3" fill="#32CD32"/>
    <circle cx="22" cy="0" r="3" fill="#FF6347"/>
  </g>
  
  <!-- Text -->
  <text x="220" y="70" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#grad1)">CrediQuest</text>
  <text x="220" y="95" font-family="Arial, sans-serif" font-size="14" fill="#666">Play. Save. Build Credit.</text>
  
  <!-- Sparkles -->
  <g fill="#FFD700">
    <path d="M 200 30 L 202 35 L 207 37 L 202 39 L 200 44 L 198 39 L 193 37 L 198 35 Z"/>
    <path d="M 480 40 L 482 45 L 487 47 L 482 49 L 480 54 L 478 49 L 473 47 L 478 45 Z"/>
    <path d="M 210 110 L 212 115 L 217 117 L 212 119 L 210 124 L 208 119 L 203 117 L 208 115 Z"/>
  </g>
</svg>
